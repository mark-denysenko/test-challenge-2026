services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mariadb:
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hashchallenge
    command: >
      --innodb-buffer-pool-size=256M
      --innodb-change-buffering=all
      --innodb-flush-log-at-trx-commit=2
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  hashapi:
    build:
      context: .
      dockerfile: src/HashChallenge.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__HashDb: "Server=mariadb;Port=3306;Database=hashchallenge;User=root;Password=rootpassword;"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      RabbitMQ__QueueName: hash-queue
      RabbitMQ__PrefetchCount: "4"
      RabbitMQ__Concurrency: "4"
      Hash__GenerateCount: "40000"
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mariadb:
        condition: service_healthy

  hashprocessor:
    build:
      context: .
      dockerfile: src/HashChallenge.Processor/Dockerfile
    environment:
      ConnectionStrings__HashDb: "Server=mariadb;Port=3306;Database=hashchallenge;User=root;Password=rootpassword;"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      RabbitMQ__QueueName: hash-queue
      RabbitMQ__PrefetchCount: "4"
      RabbitMQ__Concurrency: "4"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mariadb:
        condition: service_healthy
